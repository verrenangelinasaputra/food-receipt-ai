name: CI/CD — Build & Push Docker Image

# ── Trigger: runs on every push to main branch ────────────────────────────
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout your code from GitHub ───────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Login to Docker Hub using secrets ────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Step 3: Set up Docker Buildx (enables advanced builds) ───────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 4: Build the image and push to Docker Hub ───────────────────
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}   # only push on push, not PR
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/receipt-ai:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/receipt-ai:${{ github.sha }}
          cache-from: type=gha        # use GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max

      # ── Step 5: Print image digest (confirmation) ────────────────────────
      - name: Print Image Info
        run: |
          echo "✅ Image pushed successfully!"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/receipt-ai:latest"
          echo "Commit SHA tag: ${{ secrets.DOCKERHUB_USERNAME }}/receipt-ai:${{ github.sha }}"
